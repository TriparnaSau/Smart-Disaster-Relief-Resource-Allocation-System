<!DOCTYPE html>
<html>

<head>

<title>Emergency Response System</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<link rel="stylesheet"
href="/static/style.css"/>

</head>

<body>

<h2>Emergency Response System - East Midnapore</h2>

<div id="dashboard">

    <div class="card">
        <h3>Total Emergencies</h3>
        <p id="total">0</p>
    </div>

    <div class="card">
        <h3>High Severity</h3>
        <p id="highCount">0</p>
    </div>

    <div id="1" class="card">
        <h3>Flood Cases</h3>
        <p id="floodCount">0</p>
    </div>

    <div class="card">
        <h3>Fire Cases</h3>
        <p id="fireCount">0</p>
    </div>

    <div class="card">
        <h3>Cyclone Cases</h3>
        <p id="cycloneCount">0</p>
    </div>

    <div class="card">
        <h3>Road Accidents</h3>
        <p id="accidentCount">0</p>
    </div>

</div>


<h3>Report Disaster</h3>

<select id="type">
  <option>Flood</option>
  <option>Cyclone</option>
  <option>Fire</option>
  <option>Road Accident</option>
</select>

<select id="severity">
  <option>Low</option>
  <option>Medium</option>
  <option>High</option>
</select>

<button onclick="sendCurrentLocation()">
    Send Emergency Alert
</button>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="/static/script.js"></script>

</body>

</html>
