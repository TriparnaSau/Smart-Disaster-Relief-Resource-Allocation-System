<!DOCTYPE html>
<html>

<head>

<title>Emergency Response System</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<link rel="stylesheet"
href="/static/style.css"/>

</head>

<body>

<h2>Emergency Response System - East Midnapore</h2>

<div id="dashboard">

Total Emergencies:
<span id="total">0</span>

</div>


<h3>Report Disaster</h3>

<select id="type">
  <option>Flood</option>
  <option>Cyclone</option>
  <option>Fire</option>
  <option>Road Accident</option>
</select>

<select id="severity">
  <option>Low</option>
  <option>Medium</option>
  <option>High</option>
</select>

<button onclick="sendCurrentLocation()">
    Send Emergency Alert
</button>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="/static/script.js"></script>

</body>

</html>
